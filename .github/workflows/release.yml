name: release
on: workflow_dispatch

jobs:
  release-source:
    name: Build source gem
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      id-token: write
      contents: write

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - uses: oxidize-rb/actions/setup-ruby-and-rust@4c939d516bd77ec5806f382c9bb574f4634098a7 # v1.4.2
      with:
        ruby-version: "3.3"

    - name: Configure trusted publishing credentials
      uses: rubygems/configure-rubygems-credentials@dc5a8d8553e6ee01fc26761a49e99e733d17954a # v2.1.0

    - name: Release source gem
      run: |
        gem build watchcat.gemspec
        gem push watchcat-*.gem

  release:
    name: Build native gems
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        ruby-platform:
        - x86_64-linux
        - aarch64-linux
        - x86_64-darwin
        - arm64-darwin
        - x64-mingw-ucrt

    permissions:
      id-token: write
      contents: write

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - uses: oxidize-rb/actions/setup-ruby-and-rust@4c939d516bd77ec5806f382c9bb574f4634098a7 # v1.4.2
      with:
        ruby-version: "3.3"

    - id: cross-gem
      uses: oxidize-rb/actions/cross-gem@e5f9a49a7812a078584072f6e3f657ad247c8771 # v1.4.4
      with:
        platform: ${{ matrix.ruby-platform }}
        ruby-versions: "3.1,3.2,3.3,3.4,4.0"

    - name: Set remote URL
      run: |
        # Attribute commits to the last committer on HEAD
        git config --global user.email "$(git log -1 --pretty=format:'%ae')"
        git config --global user.name "$(git log -1 --pretty=format:'%an')"
        git remote set-url origin "https://x-access-token:${{ github.token }}@github.com/$GITHUB_REPOSITORY"
      shell: bash

    - name: Configure trusted publishing credentials
      uses: rubygems/configure-rubygems-credentials@dc5a8d8553e6ee01fc26761a49e99e733d17954a # v2.1.0

    - name: Release gem
      run: gem push ${{ steps.cross-gem.outputs.gem-path }}
